<?php
include 'db.php';

// URL-la id iruka-nu check pannuvom
if(isset($_GET['id'])) {
    $id = mysqli_real_escape_string($conn, $_GET['id']);
    
    // Database-la irundhu antha book details-ah edukkurom
    $query = "SELECT * FROM books WHERE book_id = '$id'";
    $result = mysqli_query($conn, $query);
    $book = mysqli_fetch_assoc($result);

    if($book) {
        $file_path = $book['file_path']; // Example: java.pdf
    } else {
        die("Error: Book not found in Database!");
    }
} else {
    die("Error: No Book ID provided! Go back to Dashboard and click Start Class.");
}
