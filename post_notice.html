<?php
session_start();
include 'db.php';

// Notice Post Logic
if(isset($_POST['submit_notice'])){
    $title = mysqli_real_escape_string($conn, $_POST['title']);
    $msg = mysqli_real_escape_string($conn, $_POST['message']);

    $sql = "INSERT INTO notices (title, message) VALUES ('$title', '$msg')";
    if(mysqli_query($conn, $sql)){
        echo "<script>alert('Notice Posted Successfully!'); window.location='teacher_dashboard.php';</script>";
    }
}
?>
