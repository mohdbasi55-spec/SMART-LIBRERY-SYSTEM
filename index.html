<!DOCTYPE html>
<html>
<head>
<title>Smart Library Teaching System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

header{
background:#0d1b2a;
color:white;
padding:15px;
text-align:center;
}

.layout{
display:flex;
height:90vh;
}

.sidebar{
width:240px;
background:white;
padding:15px;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
overflow:auto;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0d1b2a;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.bookGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:20px;
}

.book{
height:200px;
border-radius:12px;
display:flex;
align-items:flex-end;
justify-content:center;
color:white;
font-weight:bold;
padding:10px;
cursor:pointer;
background:linear-gradient(135deg,#1fa2ff,#12d8fa,#a6ffcb);
}

</style>
</head>

<body>

<header>

<h2>📚 Smart Library Teaching System</h2>

<div>
Mode:
<button onclick="setRole('faculty')">Faculty</button>
<button onclick="setRole('student')">Student</button>
<button onclick="setRole('admin')">Admin</button>
</div>

</header>

<div class="layout">

<div class="sidebar">

<h3>Modules</h3>

<button onclick="showPage('library')">📚 Library</button>

<button onclick="showPage('bookmark')">📌 Bookmarks</button>

<button onclick="showPage('notes')">📝 Notes</button>

<button onclick="showPage('teaching')">🎓 Teaching Mode</button>

<button onclick="showPage('progress')">📊 Student Progress</button>

<button onclick="showPage('ai')">🤖 AI Recommend</button>

<button onclick="showPage('admin')">🛠 Admin Panel</button>

</div>

<div class="main" id="main">

<div class="card">
Welcome to Smart Library System
</div>

</div>

</div>

<script>

let role="faculty"

function setRole(r){
role=r
alert("Mode changed to "+r)
}

let books=[
"Artificial Intelligence",
"Machine Learning",
"Python Programming",
"Data Science",
"Deep Learning",
"Web Development",
"Cyber Security",
"Operating Systems"
]

function showPage(page){

let main=document.getElementById("main")

if(page==="library"){

let html="<div class='card'><h2>Library</h2><div class='bookGrid'>"

books.forEach((b,i)=>{

html+=`<div class="book" onclick="openBook('${b}')">${b}</div>`

})

html+="</div></div>"

main.innerHTML=html

}

if(page==="bookmark"){

main.innerHTML=`

<div class="card">

<h2>Bookmarks</h2>

<ul>

<li>Machine Learning - Page 10</li>

<li>Python Programming - Page 15</li>

<li>Artificial Intelligence - Page 5</li>

</ul>

</div>

`

}

if(page==="notes"){

main.innerHTML=`

<div class="card">

<h2>Teacher Notes</h2>

<textarea style="width:100%;height:120px"></textarea>

<br><br>

<button onclick="alert('Note Saved')">Save Note</button>

</div>

`

}

if(page==="teaching"){

main.innerHTML=`

<div class="card">

<h2>Teaching Mode</h2>

<p>Teacher can show bookmarked pages to students.</p>

<button onclick="alert('Teaching Mode Started')">Start Teaching</button>

</div>

`

}

if(page==="progress"){

main.innerHTML=`

<div class="card">

<h2>Student Progress</h2>

<p>Students Completed: 25</p>

<p>Reading Now: 10</p>

<p>Pending: 5</p>

</div>

`

}

if(page==="ai"){

let rec=books[Math.floor(Math.random()*books.length)]

main.innerHTML=`

<div class="card">

<h2>AI Recommendation</h2>

<p>Recommended Book:</p>

<h3>${rec}</h3>

</div>

`

}

if(page==="admin"){

if(role!=="admin"){

main.innerHTML="<div class='card'>Admin Only</div>"

return

}

main.innerHTML=`

<div class="card">

<h2>Admin Panel</h2>

<input id="newBook" placeholder="Add Book">

<br><br>

<button onclick="addBook()">Add Book</button>

</div>

`

}

}

function openBook(name){

alert("Opening book: "+name)

}

function addBook(){

let name=document.getElementById("newBook").value

books.push(name)

alert("Book Added")

}

</script>

</body>
</html>
