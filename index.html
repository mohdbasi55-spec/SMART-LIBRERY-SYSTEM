<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}
header{background:#0d1b2a;color:white;padding:10px;display:flex;justify-content:space-between;}
.layout{display:flex;height:calc(100vh - 50px);}
.sidebar{width:230px;background:var(--card);padding:10px;box-shadow:2px 0 10px rgba(0,0,0,.2);}
.sidebar input,select,button{width:100%;padding:8px;margin:5px 0;border-radius:6px;}
.bookshelf{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;padding:15px;overflow-y:auto;}
.book{height:170px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;color:white;font-weight:bold;text-align:center;padding:8px;cursor:pointer;transition:.4s;box-shadow:0 5px 15px rgba(0,0,0,.4);background:linear-gradient(135deg,#1fa2ff,#12d8fa);}
.book:hover{transform:scale(1.08);}
#detail,#reader{display:none;padding:15px;}
.page{background:var(--card);padding:15px;border-radius:10px;min-height:200px;line-height:1.6;max-width:500px;margin:auto;}
mark{background:yellow;}
.progress{height:8px;background:#ccc;border-radius:10px;overflow:hidden;margin:8px 0;}
.progress span{display:block;height:100%;background:#0d1b2a;width:0;}
</style>
</head>

<body>
<header>
<h3>📚 Smart Library System</h3>
<div>📚100 | 👥120 | 📖 <span id="readCount">0</span></div>
</header>

<div class="layout" id="libraryView">
<div class="sidebar">
<input id="searchBox" onkeyup="filterBooks()" placeholder="Search book / keyword">
<select id="catBox" onchange="filterBooks()">
<option value="All">All</option>
<option value="Technical">Technical</option>
<option value="NonTechnical">Non-Technical</option>
</select>
<button onclick="setMode('')">Normal</button>
<button onclick="setMode('dark')">Dark</button>
</div>
<div class="bookshelf" id="bookGrid"></div>
</div>

<!-- BOOK DETAIL PAGE -->
<div id="detail">
<h2 id="dTitle"></h2>
<p id="dAuthor"></p>
<p id="dCat"></p>
<p id="dPages"></p>
<button onclick="openReader()">📖 Read Book</button>
<button onclick="backHome()">⬅ Back</button>
</div>

<!-- READER -->
<div id="reader">
<h2 id="bookTitle"></h2>
<div>
<select id="chapterBox" onchange="changeChapter()"></select>
</div>
<div class="progress"><span id="bar"></span></div>
<div class="page" id="pageText" onclick="highlightText(event)"></div>
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
<button onclick="backHome()">⬅ Back</button>
</div>

<script>
let tech=[..."Artificial Intelligence,Machine Learning,Deep Learning,Neural Networks,Python Programming,Java Programming,C Programming,C++ Programming,Web Development,Mobile App Development,Full Stack Development,UI UX Design,Computer Graphics,Cyber Security,Ethical Hacking,Network Security,Blockchain Technology,Data Science,Big Data Analytics,Cloud Computing,Internet of Things,Robotics,Natural Language Processing,Computer Networks,Operating Systems,Database Management,Software Engineering,Compiler Design,Distributed Systems,Augmented Reality,Virtual Reality,Human Computer Interaction,Embedded Systems,Microprocessors,DevOps,Microservices,Quantum Computing,Bioinformatics,Information Retrieval,Pattern Recognition,Digital Forensics,Information Security,Smart Systems,Game Development,Image Processing,Computer Vision,Data Mining,Business Analytics,Statistics for Computing".split(",")];

let non=[..."Life Lessons,Positive Thinking,Self Discipline,Motivational Stories,Time Management,Leadership Skills,Public Speaking,Personality Development,Mind Power,Emotional Intelligence,Success Habits,Confidence Building,Stress Management,Creative Thinking,Decision Making,Goal Setting,Communication Skills,Team Work,Critical Thinking,Adaptability,Happiness Guide,Focus Training,Memory Power,Meditation Basics,Inner Peace,Career Guidance,Study Techniques,Exam Success,Reading Skills,Writing Skills,Story Writing,Poetry Collection,Short Stories,Moral Tales,Historical Stories,Travel Stories,Inspirational Biographies,Young Achievers,Life of Scientists,Freedom Fighters,Environmental Awareness,Health & Fitness,Yoga for Life,Healthy Food,Mental Wellness,Human Values,Social Responsibility,Personal Growth,Future Vision".split(",")];

let books=[...tech.map(t=>({title:t,author:"Author "+t,cat:"Technical"})),...non.map(t=>({title:t,author:"Author "+t,cat:"NonTechnical"}))];

let chapters=["Chapter 1","Chapter 2","Chapter 3","Chapter 4"];
let pages=[...Array(40)].map((_,i)=>"Page "+(i+1)+" content with explanation and examples related to the topic.");
let grid=document.getElementById("bookGrid");
let page=0,readCount=0,currentBook=0;

function loadBooks(list){
grid.innerHTML="";
list.forEach((b,i)=>{
let d=document.createElement("div");
d.className="book";
d.innerText=b.title;
d.onclick=()=>openDetail(i);
grid.appendChild(d);
});
}
loadBooks(books);

function filterBooks(){
let t=searchBox.value.toLowerCase(),c=catBox.value;
loadBooks(books.filter(b=>
(b.title.toLowerCase().includes(t)||
b.author.toLowerCase().includes(t)||
pages.join(" ").toLowerCase().includes(t))
&&(c=="All"||b.cat==c)
));
}

function openDetail(i){
currentBook=i;
libraryView.style.display="none";
detail.style.display="block";
dTitle.innerText=books[i].title;
dAuthor.innerText="Author: "+books[i].author;
dCat.innerText="Category: "+books[i].cat;
dPages.innerText="Total Pages: 40";
}

function openReader(){
detail.style.display="none";
reader.style.display="block";
bookTitle.innerText=books[currentBook].title;
chapterBox.innerHTML="";
chapters.forEach(c=>{
let o=document.createElement("option");
o.text=c;chapterBox.add(o);
});
page=localStorage.getItem(books[currentBook].title)||0;
showPage();readCount++;readCountSpan.innerText=readCount;
}

function changeChapter(){page=0;showPage();}
function showPage(){
pageText.innerText=pages[page];
bar.style.width=((page+1)/pages.length*100)+"%";
localStorage.setItem(books[currentBook].title,page);
}
function nextPage(){if(page<pages.length-1){page++;showPage();}}
function prevPage(){if(page>0){page--;showPage();}}

function highlightText(e){
let sel=window.getSelection().toString();
if(sel){pageText.innerHTML=pageText.innerHTML.replace(sel,"<mark>"+sel+"</mark>");}
}

function backHome(){
reader.style.display="none";
detail.style.display="none";
libraryView.style.display="flex";
}
function setMode(m){document.body.className=m;}
let readCountSpan=document.getElementById("readCount");
</script>
</body>
</html>
