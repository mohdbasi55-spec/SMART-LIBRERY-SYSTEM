```html
<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

header{
background:#0d1b2a;
color:white;
padding:15px;
text-align:center;
}

.layout{
display:flex;
height:80vh;
}

.sidebar{
width:230px;
background:white;
padding:15px;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

.sidebar input,.sidebar button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #aaa;
}

.bookshelf{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
overflow:auto;
}

.book{
height:240px;
border-radius:14px;
display:flex;
align-items:flex-end;
justify-content:center;
padding:10px;
color:white;
font-weight:bold;
text-align:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.book:hover{
transform:scale(1.05);
}

#reader{
display:none;
padding:20px;
}

.page{
background:white;
padding:20px;
border-radius:10px;
min-height:200px;
}

.staffSection{
background:#f4f6fb;
padding:20px;
}

.moduleGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.module{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
}

.module:hover{
background:#0d1b2a;
color:white;
}

</style>
</head>

<body>

<header>
<h2>📚 Smart Library System</h2>
</header>

<div class="layout" id="libraryView">

<div class="sidebar">

<h3>🔍 Search</h3>
<input id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Mode</h3>
<button onclick="setMode('light')">Light</button>
<button onclick="setMode('dark')">Dark</button>

<h3>🛠 Admin</h3>
<button onclick="openAdmin()">Admin Login</button>

</div>

<div class="bookshelf" id="bookGrid"></div>

</div>

<div id="reader">
<h2 id="bookTitle"></h2>
<div class="page" id="pageText"></div>
<br>
<button onclick="back()">Back</button>
</div>

<!-- STAFF MODULE SECTION -->

<div class="staffSection">

<h2>🎓 Staff Teaching Modules</h2>

<div class="moduleGrid">

<div class="module" onclick="alert('Teaching Mode Opened')">
📖 Teaching Mode
</div>

<div class="module" onclick="alert('Lesson Planner')">
🗓 Lesson Planner
</div>

<div class="module" onclick="alert('Bookmarks')">
🔖 Bookmark Library
</div>

<div class="module" onclick="alert('Reading Progress')">
📊 Reading Progress
</div>

<div class="module" onclick="alert('Notes Share')">
📝 Share Notes
</div>

<div class="module" onclick="alert('Faculty Collaboration')">
👥 Faculty Collaboration
</div>

<div class="module" onclick="alert('Student Questions')">
❓ Student Questions
</div>

<div class="module" onclick="alert('Quiz Generator')">
🧠 Quiz Generator
</div>

<div class="module" onclick="alert('Department Library')">
🏫 Department Library
</div>

<div class="module" onclick="alert('Analytics Dashboard')">
📈 Analytics
</div>

</div>

</div>

<script>

let books=[
"Artificial Intelligence","Machine Learning","Python Programming","Data Science",
"Cloud Computing","Cyber Security","Operating Systems","Database Systems",
"Software Engineering","Web Development","Blockchain","Robotics"
];

let pages=[
"Introduction Page",
"Concept Explanation",
"Examples and Applications",
"Conclusion"
];

let grid=document.getElementById("bookGrid");

function loadBooks(list){

grid.innerHTML="";

list.forEach((b,i)=>{

let d=document.createElement("div");

d.className="book";

d.style.background="linear-gradient(135deg,#ff512f,#dd2476)";

d.innerText=b;

d.onclick=()=>openBook(i);

grid.appendChild(d);

});

}

loadBooks(books);

function filterBooks(){

let t=searchBox.value.toLowerCase();

loadBooks(books.filter(b=>b.toLowerCase().includes(t)));

}

function openBook(i){

libraryView.style.display="none";

reader.style.display="block";

bookTitle.innerText=books[i];

pageText.innerText=pages[0];

}

function back(){

reader.style.display="none";

libraryView.style.display="flex";

}

function setMode(m){

if(m=="dark") document.body.style.background="#111";
else document.body.style.background="#eef2f7";

}

function openAdmin(){

let pass=prompt("Enter Admin Password");

if(pass=="1234"){

let name=prompt("Enter new book");

if(name){

books.push(name);

loadBooks(books);

alert("Book Added");

}

}else{

alert("Wrong Password");

}

}

</script>

</body>
</html>
