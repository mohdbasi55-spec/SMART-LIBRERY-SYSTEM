<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--bg:#eef2f7;
--text:#000;
--card:#fff;
--header:#0d1b2a;
}

.dark{
--bg:#121212;
--text:#fff;
--card:#1e1e1e;
--header:#000;
}

.ambience{
--bg:#0b132b;
--text:#eaeaea;
--card:#1c2541;
--header:#000;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
background:var(--header);
color:white;
padding:10px;
text-align:center;
}

/* TOP MENU */

.topMenu{
display:flex;
justify-content:center;
gap:20px;
background:#1b263b;
padding:8px;
}

.topMenu button{
background:#415a77;
color:white;
border:none;
padding:8px 18px;
border-radius:6px;
cursor:pointer;
}

.topMenu button:hover{
background:#778da9;
}

/* LAYOUT */

.layout{
display:flex;
height:calc(100vh - 100px);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:var(--card);
padding:15px;
overflow:auto;
box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

.sidebar input,
.sidebar button{
width:100%;
padding:8px;
margin-top:6px;
border-radius:6px;
border:1px solid #aaa;
}

.module{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
}

/* BOOK AREA */

.bookshelf{
flex:1;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:18px;
overflow-y:auto;
}

.book{
height:220px;
border-radius:12px;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
justify-content:center;
color:white;
font-weight:bold;
padding:10px;
text-shadow:0 2px 6px black;
cursor:pointer;
transition:.3s;
}

.book:hover{
transform:scale(1.06);
}

/* READER */

#reader{
display:none;
padding:20px;
}

.page{
background:white;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h2>📚 Smart Library System</h2>
<div>Staff Digital Teaching Library</div>
</header>

<div class="topMenu">
<button onclick="showLibrary()">Library</button>
<button onclick="alert('Staff Panel Loaded')">Staff Panel</button>
<button onclick="alert('Student Panel Loaded')">Student Panel</button>
</div>

<div class="layout" id="libraryView">

<div class="sidebar">

<h3>🔍 Search</h3>
<input id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Modes</h3>
<button onclick="setMode('')">Normal</button>
<button onclick="setMode('dark')">Dark</button>
<button onclick="setMode('ambience')">Library</button>

<h3>🤖 AI Recommend</h3>
<div id="recommend">---</div>

<hr>

<h3>👨‍🏫 Faculty Login</h3>

<input id="fid" placeholder="Faculty ID">
<input id="fpass" type="password" placeholder="Password">

<button onclick="facultyLogin()">Login</button>

<div id="facultyStatus"></div>

<hr>

<button onclick="teachingMode()">📖 Teaching Mode</button>

<div class="module">

<b>📚 Lesson Planner</b>

<input id="lessonTopic" placeholder="Topic">

<button onclick="saveLesson()">Save Lesson</button>

<div id="lessonList"></div>

</div>

<div class="module">

<b>⭐ Bookmarks</b>

<div id="bookmarks"></div>

</div>

<div class="module">

<b>📊 Reading Progress</b>

<div id="progress"></div>

</div>

<div class="module">

<b>📝 Notes Share</b>

<input id="noteText" placeholder="Write note">

<button onclick="addNote()">Share Note</button>

<div id="notes"></div>

</div>

<div class="module">

<b>👨‍💻 Faculty Collaboration</b>

<button onclick="collab()">Share Idea</button>

<div id="collabBox"></div>

</div>

</div>

<div class="bookshelf" id="bookGrid"></div>

</div>

<div id="reader">

<h2 id="bookTitle"></h2>

<div class="page" id="pageText"></div>

<button onclick="bookmarkPage()">⭐ Bookmark</button>

<button onclick="back()">⬅ Back</button>

</div>

<script>

/* BOOK DATA */

let books=[
"Artificial Intelligence","Machine Learning","Python Programming","Cyber Security",
"Cloud Computing","Robotics","Data Science","Blockchain","Deep Learning",
"Computer Networks","Operating Systems","Algorithms",
"Life Lessons","Positive Thinking","Time Management","Leadership Skills",
"Public Speaking","Personality Development","Mind Power","Emotional Intelligence"
]

let images=[
"https://images.unsplash.com/photo-1677442136019-21780ecad995",
"https://images.unsplash.com/photo-1555949963-aa79dcee981c",
"https://images.unsplash.com/photo-1515879218367-8466d910aaa4",
"https://images.unsplash.com/photo-1518779578993-ec3579fee39f",
"https://images.unsplash.com/photo-1451187580459-43490279c0fa"
]

let grid=document.getElementById("bookGrid")

function loadBooks(list){

grid.innerHTML=""

list.forEach((b,i)=>{

let d=document.createElement("div")

d.className="book"

d.style.backgroundImage="url("+images[i%images.length]+")"

d.innerText=b

d.onclick=()=>openBook(i)

grid.appendChild(d)

})

recommend.innerText=list[Math.floor(Math.random()*list.length)]

}

loadBooks(books)

function filterBooks(){

let t=searchBox.value.toLowerCase()

loadBooks(books.filter(b=>b.toLowerCase().includes(t)))

}

function openBook(i){

libraryView.style.display="none"

reader.style.display="block"

bookTitle.innerText=books[i]

pageText.innerText="Teaching content of "+books[i]+" with explanation and examples."

updateProgress(books[i])

}

function back(){

reader.style.display="none"

libraryView.style.display="flex"

}

function setMode(m){

document.body.className=m

}

function facultyLogin(){

let id=document.getElementById("fid").value

let pass=document.getElementById("fpass").value

if(pass=="1234"){

facultyStatus.innerHTML="✅ Logged in: "+id

}else{

facultyStatus.innerHTML="❌ Wrong Password"

}

}

function teachingMode(){

alert("Teaching Mode Activated\nProjector View Enabled")

}

function saveLesson(){

let topic=document.getElementById("lessonTopic").value

let div=document.createElement("div")

div.innerText=topic

lessonList.appendChild(div)

}

function bookmarkPage(){

let div=document.createElement("div")

div.innerText=bookTitle.innerText

bookmarks.appendChild(div)

}

function updateProgress(book){

let div=document.createElement("div")

div.innerText=book+" → 10%"

progress.appendChild(div)

}

function addNote(){

let txt=document.getElementById("noteText").value

let d=document.createElement("div")

d.innerText=txt

notes.appendChild(d)

}

function collab(){

let idea=prompt("Share teaching idea")

let d=document.createElement("div")

d.innerText=idea

collabBox.appendChild(d)

}

function showLibrary(){

libraryView.style.display="flex"

reader.style.display="none"

}

</script>

</body>
</html>
