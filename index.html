<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;--header:#000;}
.ambience{--bg:#0b132b;--text:#eaeaea;--card:#1c2541;--header:#000;}
.sepia{--bg:#f4ecd8;--text:#5b4636;--card:#fff3d6;--header:#7a5c3e;}
.focus{--bg:#111;--text:#fff;--card:#1b1b1b;--header:#000;}

body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

header{
background:var(--header);
color:white;padding:12px 15px;
display:flex;justify-content:space-between;align-items:center;
}

.layout{display:flex;height:calc(100vh - 60px);}

.sidebar{
width:260px;
background:var(--card);
padding:15px;
box-shadow:2px 0 12px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar section{
background:#f0f2f5;
padding:12px;
border-radius:12px;
}

.sidebar h3{margin:5px 0;}

.sidebar input,.sidebar button,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #aaa;
margin-top:8px;
}

.bookshelf{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:25px;
overflow-y:auto;
background:var(--bg);
}

.book{
height:220px;
width:150px;
border-radius:8px;
display:flex;
align-items:flex-end;
justify-content:center;
padding:8px;
text-align:center;
font-weight:bold;
color:#fff;
cursor:pointer;
box-shadow:8px 8px 20px rgba(0,0,0,0.4);
transform:perspective(600px) rotateY(-12deg);
transition:.4s;
}
.book:hover{transform:perspective(600px) rotateY(0deg) scale(1.05);}

#reader{display:none;padding:20px;text-align:center;}
.page{
background:var(--card);
max-width:450px;
margin:auto;
padding:15px;
border-radius:12px;
min-height:200px;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

.progress{height:8px;background:#ccc;border-radius:10px;overflow:hidden;margin:10px;}
.progress span{display:block;height:100%;background:#0d1b2a;width:0;}

button.main{background:#0d1b2a;color:white;border:none;}

@media(max-width:768px){
.layout{flex-direction:column;}
.sidebar{width:100%;}
}
</style>
</head>

<body>
<header>
<h3>📚 Smart Library System</h3>
<div>📚 <span id="total">100</span> | 👥120 | 📖 <span id="readCount">0</span></div>
</header>

<div class="layout" id="libraryView">

<div class="sidebar">

<section>
<h3>🔍 Search</h3>
<input type="text" id="searchBox" onkeyup="filterBooks()" placeholder="Search book">
</section>

<section>
<h3>🎨 Modes</h3>
<select onchange="setMode(this.value)">
<option value="">Light Mode</option>
<option value="dark">Dark Mode</option>
<option value="ambience">Library Ambience</option>
<option value="sepia">Sepia Reading</option>
<option value="focus">Focus Mode</option>
</select>
</section>

<section>
<h3>🤖 AI Recommendation</h3>
<button onclick="recommend()">Recommend Book</button>
<p id="aiText">Click to get suggestion</p>
</section>

<section id="adminLock">
<h3>🔐 Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter password">
<button onclick="unlockAdmin()">Login</button>
</section>

<section id="adminPanel" style="display:none;">
<h3>🛠 Admin Panel</h3>
<input type="text" id="newBook" placeholder="New book name">
<button onclick="addBook()">Add Book</button>
<input type="text" id="removeBook" placeholder="Remove book name">
<button onclick="removeBook()">Remove Book</button>
</section>

</div>

<div class="bookshelf" id="bookGrid"></div>
</div>

<div id="reader">
<h2 id="bookTitle"></h2>
<div class="progress"><span id="bar"></span></div>
<div class="page" id="pageText"></div>
<button class="main" onclick="prevPage()">⬅</button>
<button class="main" onclick="nextPage()">➡</button>
<button class="main" onclick="back()">⬅ Back</button>
</div>

<script>
let adminPassword="1234";

let techBooks=["Artificial Intelligence","Machine Learning","Python Programming","Java Programming","Web Development",
"Cyber Security","Cloud Computing","Data Science","Robotics","Blockchain","IoT","Computer Networks","Operating Systems",
"Database Systems","Software Engineering","DevOps","Microservices","Quantum Computing","AI Ethics","Computer Vision",
"Neural Networks","Big Data","UI UX Design","Game Development","Digital Forensics","Automation","Edge Computing",
"5G Technology","Compiler Design","Distributed Systems","Bioinformatics","NLP","Information Retrieval","Smart Systems",
"Virtual Reality","Augmented Reality","Embedded Systems","Microprocessors","Pattern Recognition","HCI",
"Digital Image Processing","Information Security","Data Mining","Data Analytics","Computer Graphics"];

let nonTechBooks=["Life Lessons","Positive Thinking","Self Discipline","Motivational Stories","Time Management",
"Leadership Skills","Public Speaking","Personality Development","Mind Power","Emotional Intelligence","Success Habits",
"Confidence Building","Stress Management","Creative Thinking","Decision Making","Goal Setting","Communication Skills",
"Team Work","Critical Thinking","Adaptability","Happiness Guide","Focus Training","Memory Power","Meditation Basics",
"Inner Peace","Career Guidance","Study Techniques","Exam Success","Reading Skills","Writing Skills","Story Writing",
"Poetry Collection","Short Stories","Moral Tales","Historical Stories","Travel Stories","Inspirational Biographies",
"Young Achievers","Freedom Fighters","Environmental Awareness","Health & Fitness","Yoga for Life","Healthy Food",
"Mental Wellness","Human Values","Social Responsibility","Personal Growth","Future Vision","Peaceful Living"];

let books=[...techBooks,...nonTechBooks];

let gradients=[
"linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#1fa2ff,#12d8fa,#a6ffcb)",
"linear-gradient(135deg,#8360c3,#2ebf91)",
"linear-gradient(135deg,#ffb347,#ffcc33)",
"linear-gradient(135deg,#fc466b,#3f5efb)"
];

let pages=[];
for(let i=1;i<=40;i++){pages.push("Chapter "+i+": This page explains the topic clearly with examples.");}

let grid=document.getElementById("bookGrid");
let readCount=0,page=0,currentBook=0;

function loadBooks(list){
grid.innerHTML="";
list.forEach((b,i)=>{
let d=document.createElement("div");
d.className="book";
d.style.background=gradients[i%5];
d.innerText=b;
d.onclick=()=>openBook(i);
grid.appendChild(d);
});
document.getElementById("total").innerText=list.length;
}
loadBooks(books);

function filterBooks(){
let t=searchBox.value.toLowerCase();
loadBooks(books.filter(b=>b.toLowerCase().includes(t)));
}

function openBook(i){
currentBook=i;page=0;
libraryView.style.display="none";
reader.style.display="block";
bookTitle.innerText="📘 "+books[i];
showPage();
readCount++;
document.getElementById("readCount").innerText=readCount;
}

function showPage(){
pageText.innerText=pages[page];
bar.style.width=((page+1)/pages.length*100)+"%";
}

function nextPage(){if(page<pages.length-1){page++;showPage();}}
function prevPage(){if(page>0){page--;showPage();}}
function back(){reader.style.display="none";libraryView.style.display="flex";}

function setMode(m){document.body.className=m;}

function recommend(){
let random=books[Math.floor(Math.random()*books.length)];
document.getElementById("aiText").innerText="📖 Suggested: "+random;
}

function unlockAdmin(){
let p=document.getElementById("adminPass").value;
if(p===adminPassword){
adminLock.style.display="none";
adminPanel.style.display="block";
alert("Admin unlocked");
}else alert("Wrong password");
}

function addBook(){
let name=newBook.value;
if(name.trim()=="")return;
books.push(name);
loadBooks(books);
newBook.value="";
}

function removeBook(){
let name=removeBook.value.toLowerCase();
books=books.filter(b=>b.toLowerCase()!=name);
loadBooks(books);
removeBook.value="";
}
</script>
</body>
</html>
