<!DOCTYPE html>
<html>
<head>
<title>Smart Library</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

input{
width:60%;
padding:10px;
font-size:16px;
}

button{
padding:10px;
font-size:16px;
cursor:pointer;
}

.book{
background:white;
padding:10px;
margin:10px 0;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
AI Smart Library
</header>

<div class="container">

<h2>Smart Book Search</h2>

<input type="text" id="searchBox" placeholder="Search books like AI, Python, Deep Learning">
<button onclick="searchBooks()">Search</button>

<div id="results"></div>

</div>

<script>

let books=[

{name:"Deep Learning",tags:["ai","machine learning","neural network"]},

{name:"Machine Learning Basics",tags:["machine learning","ai","data"]},

{name:"Neural Networks Guide",tags:["deep learning","ai","neural network"]},

{name:"Python for Data Science",tags:["python","data science","ai"]},

{name:"Artificial Intelligence Basics",tags:["ai","machine learning"]},

{name:"Data Science Handbook",tags:["data","python","analysis"]},

{name:"Computer Vision",tags:["deep learning","image","ai"]},

{name:"Natural Language Processing",tags:["ai","nlp","deep learning"]},

{name:"Reinforcement Learning",tags:["machine learning","ai"]},

{name:"Python Programming",tags:["python","coding"]}

];

function searchBooks(){

let search=document.getElementById("searchBox").value.toLowerCase();

let resultDiv=document.getElementById("results");

resultDiv.innerHTML="";

let results=[];

books.forEach(book=>{

if(book.name.toLowerCase().includes(search) ||
book.tags.some(tag=>tag.includes(search))){

results.push(book);

}

});

if(results.length==0){

books.forEach(book=>{
if(book.tags.includes("ai") || book.tags.includes("machine learning")){
results.push(book);
}
});

}

results.forEach(book=>{

let div=document.createElement("div");

div.className="book";

div.innerHTML="<b>"+book.name+"</b><br>Related Topics: "+book.tags.join(", ");

resultDiv.appendChild(div);

});

}

</script>

</body>
</html>
