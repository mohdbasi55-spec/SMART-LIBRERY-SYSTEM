<!DOCTYPE html>
<html>
<head>
<style>
body{
background:#111;
font-family:Arial;
padding:40px;
}
.books{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}
.book{
height:260px;
border-radius:12px;
background-size:cover;
background-position:center;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
position:relative;
transition:0.4s;
}
.book:hover{
transform:rotateY(-10deg) scale(1.05);
}
.title{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.7);
color:white;
padding:10px;
text-align:center;
font-weight:bold;
border-radius:0 0 12px 12px;
}
</style>
</head>

<body>

<div class="books">
  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?python,programming')">
    <div class="title">Python Programming</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?java,code')">
    <div class="title">Java Basics</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?cyber,security')">
    <div class="title">Cyber Security</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?data,structure')">
    <div class="title">Data Structures</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?motivation,success')">
    <div class="title">Life Motivation</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?leadership,business')">
    <div class="title">Leadership Skills</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?brain,science')">
    <div class="title">Mind Power</div>
  </div>

  <div class="book" style="background-image:url('https://source.unsplash.com/400x600/?study,books')">
    <div class="title">Study Skills</div>
  </div>
</div>

</body>
</html>
