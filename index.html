<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Smart Library | College Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar { transition: width 0.3s; }
        .book-card:hover { transform: translateY(-8px); transition: 0.3s; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .ai-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-20 lg:w-64 bg-indigo-950 text-white flex flex-col p-4">
        <div class="flex items-center gap-3 mb-10 px-2">
            <i class="fas fa-brain text-blue-400 text-3xl"></i>
            <span class="hidden lg:block font-bold text-xl tracking-widest">NEX-LIB</span>
        </div>
        <nav class="flex-1 space-y-4">
            <button onclick="showSection('home')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-white/10 transition"><i class="fas fa-home"></i> <span class="hidden lg:block">Home</span></button>
            <button onclick="showSection('teaching')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-blue-600 transition"><i class="fas fa-chalkboard-teacher text-yellow-400"></i> <span class="hidden lg:block font-bold">Staff Console</span></button>
            <button onclick="showSection('library')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-white/10 transition"><i class="fas fa-book"></i> <span class="hidden lg:block">Catalog</span></button>
            <button onclick="generateAIQuiz()" class="w-full flex items-center gap-4 p-3 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg"><i class="fas fa-robot"></i> <span class="hidden lg:block font-bold text-xs uppercase">AI Quiz Gen</span></button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-20 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <div class="flex-1 max-w-xl">
                <div class="relative group">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="megaSearch" onkeyup="smartSearch()" placeholder="Search Technical, Humanities, Literature..." class="w-full pl-12 pr-4 py-3 rounded-full bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-sm font-bold text-gray-800">Department: IT / CSE</p>
                    <p class="text-xs text-green-500 font-semibold"><i class="fas fa-circle text-[8px] animate-pulse"></i> Live Sync Active</p>
                </div>
                <img src="https://ui-avatars.com/api/?name=Staff+User" class="w-10 h-10 rounded-full border-2 border-blue-500">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="homeSection">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black text-gray-900">Recommended for Your Dept</h2>
                    <div class="flex gap-2">
                        <select onchange="filterDept(this.value)" class="bg-white px-4 py-2 rounded-lg border text-sm font-bold outline-none focus:ring-2 ring-blue-100 cursor-pointer">
                            <option value="all">All Categories</option>
                            <option value="technical">Technical (Engg)</option>
                            <option value="non-technical">Non-Technical (Arts)</option>
                        </select>
                    </div>
                </div>

                <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    </div>
            </div>
        </div>
    </main>

    <div id="readerModal" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <nav class="h-16 bg-indigo-950 text-white flex items-center justify-between px-6">
            <h3 id="readerTitle" class="font-bold">Staff Teaching Mode</h3>
            <div class="flex gap-4">
                <button onclick="startVoiceBroadcast()" class="bg-red-600 px-4 py-1 rounded-full text-xs font-bold animate-pulse"><i class="fas fa-microphone"></i> LIVE</button>
                <button onclick="closeReader()" class="text-2xl">&times;</button>
            </div>
        </nav>
        <div class="flex flex-1 overflow-hidden">
            <div class="flex-1 p-10 overflow-y-auto bg-gray-100">
                <div class="bg-white shadow-2xl p-12 min-h-screen max-w-4xl mx-auto rounded-lg">
                    <p id="bookContent" class="text-gray-700 leading-loose text-lg"></p>
                </div>
            </div>
            <div class="w-96 border-l p-6 flex flex-col gap-6">
                <h4 class="font-bold text-indigo-900 uppercase text-xs">Teaching Notes (Auto-Sync)</h4>
                <textarea class="w-full flex-1 border rounded-2xl p-4 text-sm focus:ring-2 ring-blue-500 outline-none" placeholder="Staff can type summaries here... Students will see it instantly."></textarea>
                <button class="bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">Save & Broadcast</button>
            </div>
        </div>
    </div>

    <script>
        const booksDB = [
            { id: 1, title: "Modern AI & ML", author: "Dr. Andrew Ng", cat: "technical", rating: 4.9, info: "Core concepts of neural networks and learning algorithms." },
            { id: 2, title: "Wings of Fire", author: "Dr. APJ Abdul Kalam", cat: "non-technical", rating: 5.0, info: "Inspirational autobiography of the Missile Man of India." },
            { id: 3, title: "Cloud Computing", author: "Satya Nadella", cat: "technical", rating: 4.7, info: "Architecture and design of distributed cloud systems." },
            { id: 4, title: "English Literature", author: "Shakespeare", cat: "non-technical", rating: 4.5, info: "Classic collection of plays and sonnets." }
        ];

        function renderBooks(data) {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = data.map(book => `
                <div class="bg-white rounded-3xl p-6 border border-gray-100 book-card">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase rounded-full">${book.cat}</span>
                        <div class="flex text-yellow-400 text-xs">
                            ${'<i class="fas fa-star"></i>'.repeat(Math.floor(book.rating))}
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-1">${book.title}</h3>
                    <p class="text-sm text-gray-400 mb-4 italic">By ${book.author}</p>
                    <p class="text-xs text-gray-500 mb-6 line-clamp-2 leading-relaxed">${book.info}</p>
                    <div class="flex gap-2">
                        <button onclick="openReader('${book.title}', '${book.info}')" class="flex-1 bg-indigo-900 text-white py-3 rounded-xl text-xs font-bold hover:bg-blue-600 transition shadow-md">READ & TEACH</button>
                        <button class="bg-gray-100 p-3 rounded-xl hover:bg-red-50 hover:text-red-500 transition"><i class="fas fa-bookmark"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function filterDept(val) {
            const filtered = val === 'all' ? booksDB : booksDB.filter(b => b.cat === val);
            renderBooks(filtered);
        }

        function smartSearch() {
            const q = document.getElementById('megaSearch').value.toLowerCase();
            const filtered = booksDB.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
            renderBooks(filtered);
        }

        function openReader(title, info) {
            document.getElementById('readerModal').classList.remove('hidden');
            document.getElementById('readerTitle').innerText = "TEACHING MODE: " + title;
            document.getElementById('bookContent').innerText = "Content of " + title + ": " + info.repeat(20);
        }

        function closeReader() {
            document.getElementById('readerModal').classList.add('hidden');
        }

        function generateAIQuiz() {
            alert("AI is reading the current book catalog... 10 MCQs generated and sent to Students Portal.");
        }

        function startVoiceBroadcast() {
            alert("Voice Synthesis Active: Your explanation is being recorded and converted to text for students.");
        }

        // Init
        renderBooks(booksDB);
    </script>
</body>
</html>
