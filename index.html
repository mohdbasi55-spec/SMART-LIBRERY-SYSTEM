<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;--header:#000;}
.ambience{--bg:#0b132b;--text:#eaeaea;--card:#1c2541;--header:#000;}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

header{background:var(--header);color:white;padding:10px 15px;display:flex;flex-direction:column;gap:6px;}
.topRow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.centerStats{font-weight:bold;}

.layout{display:flex;height:calc(100vh - 120px);}
.sidebar{width:240px;background:var(--card);padding:15px;box-shadow:2px 0 10px rgba(0,0,0,0.1);}
.sidebar input,button{width:100%;padding:10px;border-radius:8px;border:1px solid #aaa;margin-top:8px;}

.bookshelf{
flex:1;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:25px;
overflow-y:auto;
}

.book{
height:260px;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 15px 30px rgba(0,0,0,0.7);
transition:.4s;
cursor:pointer;
background:#000;
}

.book img{
width:100%;
height:100%;
object-fit:cover;
}

.book:hover{transform:rotateY(-8deg) scale(1.05);}

.title{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
color:white;
font-weight:bold;
text-align:center;
}

#reader{display:none;padding:15px;}
.page{background:var(--card);padding:20px;border-radius:15px;min-height:300px;line-height:1.7;}

@media(max-width:768px){
.layout{flex-direction:column;}
.sidebar{width:100%;}
}
</style>
</head>

<body>
<header>
  <div class="topRow">
    <h3>📚 Smart Library System</h3>
    <div class="centerStats">📚100 | 👥120 | 📖 <span id="readCount">0</span></div>
  </div>
</header>

<div class="layout" id="libraryView">
<div class="sidebar">
<h3>🔍 Search</h3>
<input type="text" id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Modes</h3>
<button onclick="setMode('')">Normal</button>
<button onclick="setMode('dark')">Dark</button>
<button onclick="setMode('ambience')">Library Ambience</button>

<h3>🤖 AI Recommend</h3>
<div id="recommend">---</div>

<h3>🛠 Admin Panel</h3>
<button onclick="alert('Admin: Users=120, Books=100')">View Stats</button>
<button onclick="alert('Admin: Book added (simulation)')">Add Book</button>
</div>

<div class="bookshelf" id="bookGrid"></div>
</div>

<div id="reader">
<h2 id="bookTitle"></h2>
<div class="page" id="pageText"></div>
<button onclick="back()">⬅ Back</button>
</div>

<script>
let books=[
{title:"Python Programming",img:"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=400&q=80"},
{title:"Artificial Intelligence",img:"https://images.unsplash.com/photo-1581091012184-5c8dca5f1b1f?auto=format&fit=crop&w=400&q=80"},
{title:"Machine Learning",img:"https://images.unsplash.com/photo-1504639725590-34d0984388bd?auto=format&fit=crop&w=400&q=80"},
{title:"Web Development",img:"https://images.unsplash.com/photo-1517433456452-f9633a875f6f?auto=format&fit=crop&w=400&q=80"},
{title:"Cyber Security",img:"https://images.unsplash.com/photo-1585079542156-2755d9c8a094?auto=format&fit=crop&w=400&q=80"},
{title:"Cloud Computing",img:"https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=400&q=80"},
{title:"Data Science",img:"https://images.unsplash.com/photo-1581090700227-3a8f71c7b52b?auto=format&fit=crop&w=400&q=80"},
{title:"Mobile App Development",img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=400&q=80"},
{title:"Robotics",img:"https://images.unsplash.com/photo-1581093588401-22d4f4a3b64c?auto=format&fit=crop&w=400&q=80"},
{title:"Blockchain",img:"https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?auto=format&fit=crop&w=400&q=80"},

{title:"Life Lessons",img:"https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=400&q=80"},
{title:"Positive Thinking",img:"https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80"},
{title:"Motivational Stories",img:"https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=400&q=80"},
{title:"Time Management",img:"https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=400&q=80"},
{title:"Self Discipline",img:"https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=400&q=80"},
{title:"Emotional Intelligence",img:"https://images.unsplash.com/photo-1515165562835-c4c8f4b3f7aa?auto=format&fit=crop&w=400&q=80"},
{title:"Leadership Skills",img:"https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=400&q=80"},
{title:"Public Speaking",img:"https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&w=400&q=80"},
{title:"Stress Management",img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=400&q=80"},
{title:"Mind Power",img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=400&q=80"}
];

// duplicate till 100
while(books.length<100){books.push(...books.slice(0,20));}

let grid=document.getElementById("bookGrid");
let readCount=0;

function loadBooks(list){
grid.innerHTML="";
list.forEach((b,i)=>{
let d=document.createElement("div");
d.className="book";
d.innerHTML=`<img src="${b.img}"><div class="title">${b.title}</div>`;
d.onclick=()=>openBook(b.title);
grid.appendChild(d);
});
recommend.innerText=list[Math.floor(Math.random()*list.length)].title;
}
loadBooks(books);

function filterBooks(){
let t=searchBox.value.toLowerCase();
loadBooks(books.filter(b=>b.title.toLowerCase().includes(t)));
}

function openBook(title){
libraryView.style.display="none";
reader.style.display="block";
bookTitle.innerText=title;
pageText.innerText="This book explains "+title+" with simple and real life examples.";
readCount++;
document.getElementById("readCount").innerText=readCount;
}

function back(){reader.style.display="none";libraryView.style.display="flex";}
function setMode(m){document.body.className=m;}
</script>
</body>
</html>
