<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;--header:#000;}
.ambience{--bg:#0b132b;--text:#eaeaea;--card:#1c2541;--header:#000;}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

header{background:var(--header);color:white;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;}
.topBox{display:flex;gap:10px;align-items:center;}

.layout{display:flex;height:calc(100vh - 60px);}
.sidebar{width:260px;background:var(--card);padding:15px;box-shadow:2px 0 10px rgba(0,0,0,0.1);}
.sidebar input,select,button{width:100%;padding:10px;border-radius:8px;border:1px solid #aaa;margin-top:8px;}

.bookshelf{flex:1;padding:15px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:18px;overflow-y:auto;}
.book{height:200px;border-radius:12px;display:flex;align-items:flex-end;justify-content:center;
color:#fff;font-weight:bold;text-align:center;padding:10px;cursor:pointer;transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.35);}
.book:hover{transform:scale(1.05);}

#reader{display:none;padding:15px;}
.page{background:var(--card);padding:18px;border-radius:12px;min-height:220px;line-height:1.7;}
.progress{height:8px;background:#ccc;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress span{display:block;height:100%;background:#0d1b2a;width:0;}

.aiBox{background:#0d1b2a;color:#fff;padding:8px;border-radius:8px;text-align:center;cursor:pointer;}
</style>
</head>

<body>
<header>
<h3>📚 Smart Library System</h3>
<div class="topBox">
<div class="aiBox" onclick="aiRecommend()">🤖 AI Pick</div>
<div>📚100</div>
</div>
</header>

<div class="layout" id="libraryView">
<div class="sidebar">
<input type="text" id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Modes</h3>
<button onclick="setMode('')">Light</button>
<button onclick="setMode('dark')">Dark</button>
<button onclick="setMode('ambience')">Ambience</button>

<h3>🛠 Admin</h3>
<button onclick="adminPanel()">Admin Panel</button>
</div>

<div class="bookshelf" id="bookGrid"></div>
</div>

<div id="reader">
<h2 id="bookTitle"></h2>
<div class="progress"><span id="bar"></span></div>
<div class="page" id="pageText"></div>
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
<button onclick="back()">⬅ Back</button>
</div>

<script>
let technicalBooks=[
"Artificial Intelligence","Machine Learning","Deep Learning","Python Programming","Java Programming",
"C Programming","C++ Programming","Web Development","Mobile App Development","Cloud Computing",
"Cyber Security","Ethical Hacking","Data Science","Big Data","Blockchain",
"Computer Networks","Operating Systems","Database Management","Software Engineering","Compiler Design",
"DevOps","Microservices","IoT","Robotics","NLP",
"Quantum Computing","Bioinformatics","Digital Forensics","UI UX Design","Game Development",
"AR VR","Embedded Systems","Microprocessors","Network Security","Information Security",
"Pattern Recognition","Smart Systems","Distributed Systems","Human Computer Interaction","Digital Image Processing",
"Computer Graphics","AI Ethics","Full Stack Development","System Design","Linux Administration",
"Shell Scripting","Kubernetes","Docker"
];

let nonTechnicalBooks=[
"Life Lessons","Positive Thinking","Self Discipline","Motivational Stories","Time Management",
"Leadership Skills","Public Speaking","Personality Development","Mind Power","Emotional Intelligence",
"Success Habits","Confidence Building","Stress Management","Creative Thinking","Decision Making",
"Goal Setting","Communication Skills","Team Work","Critical Thinking","Adaptability",
"Happiness Guide","Focus Training","Memory Power","Meditation Basics","Inner Peace",
"Career Guidance","Study Techniques","Exam Success","Reading Skills","Writing Skills",
"Story Writing","Poetry Collection","Short Stories","Moral Tales","Historical Stories",
"Travel Stories","Inspirational Biographies","Young Achievers","Freedom Fighters","Environmental Awareness",
"Health & Fitness","Yoga for Life","Healthy Food","Mental Wellness","Human Values",
"Social Responsibility","Personal Growth","Future Vision","Life Skills","Peaceful Living"
];

let books=[...technicalBooks,...nonTechnicalBooks];

let gradients=["linear-gradient(135deg,#ff512f,#dd2476)",
"linear-gradient(135deg,#1fa2ff,#12d8fa,#a6ffcb)",
"linear-gradient(135deg,#8360c3,#2ebf91)",
"linear-gradient(135deg,#ffb347,#ffcc33)",
"linear-gradient(135deg,#fc466b,#3f5efb)"];

let pages=[];
for(let i=1;i<=30;i++){
pages.push("This chapter explains the topic in detail with real world examples and simple explanation. Section "+i+".");
}

let grid=document.getElementById("bookGrid");
let page=0,currentBook=0;

function loadBooks(list){
grid.innerHTML="";
list.forEach((b,i)=>{
let d=document.createElement("div");
d.className="book";
d.style.background=gradients[i%5];
d.innerText=b;
d.onclick=()=>openBook(i);
grid.appendChild(d);
});
}
loadBooks(books);

function filterBooks(){
let t=searchBox.value.toLowerCase();
loadBooks(books.filter(b=>b.toLowerCase().includes(t)));
}

function openBook(i){
currentBook=i;page=0;
libraryView.style.display="none";
reader.style.display="block";
bookTitle.innerText=books[i];
showPage();
}
function showPage(){
pageText.innerText=pages[page];
bar.style.width=((page+1)/pages.length*100)+"%";
}
function nextPage(){if(page<pages.length-1){page++;showPage();}}
function prevPage(){if(page>0){page--;showPage();}}
function back(){reader.style.display="none";libraryView.style.display="flex";}
function setMode(m){document.body.className=m;}

function aiRecommend(){
let pick=books[Math.floor(Math.random()*books.length)];
alert("🤖 AI recommends: "+pick);
}

function adminPanel(){
let pass=prompt("Enter Admin Password:");
if(pass=="1234"){
let name=prompt("Enter new book name:");
if(name){books.push(name);loadBooks(books);}
}else{
alert("Wrong password");
}
}
</script>
</body>
</html>
