<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;--header:#000;}
.ambience{--bg:#0b132b;--text:#eaeaea;--card:#1c2541;--header:#000;}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

header{background:var(--header);color:white;padding:10px 15px;display:flex;flex-direction:column;gap:6px;}
.topRow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.statusBar,.quoteBar,.currentRead{background:rgba(255,255,255,0.12);padding:6px 12px;border-radius:10px;font-size:14px;}
.timer{font-weight:bold;}
.centerStats{font-weight:bold;}

.layout{display:flex;height:calc(100vh - 140px);}
.sidebar{width:240px;background:var(--card);padding:15px;box-shadow:2px 0 10px rgba(0,0,0,0.1);}
.sidebar input,.sidebar button{width:100%;padding:10px;border-radius:8px;border:1px solid #aaa;margin-top:8px;}

.bookshelf{flex:1;padding:15px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:22px;overflow-y:auto;}
.book{
height:260px;border-radius:16px;
display:flex;align-items:flex-end;justify-content:center;
color:#fff;font-weight:bold;text-align:center;
padding:12px;cursor:pointer;transition:.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
font-size:16px;
background-size:cover;
background-position:center;
position:relative;
}
.book::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
border-radius:16px;
}
.book span{position:relative;z-index:1;}
.book:hover{transform:scale(1.08);}

#reader{display:none;padding:15px;}
.page{background:var(--card);padding:20px;border-radius:15px;min-height:300px;line-height:1.7;}
.progress{height:10px;background:#ccc;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress span{display:block;height:100%;background:#0d1b2a;width:0;}
</style>
</head>

<body>
<header>
  <div class="topRow">
    <h3>📚 Smart Library System</h3>
    <div class="centerStats">📚100 | 👥120 | 📖 <span id="readCount">0</span></div>
  </div>
  <div class="topRow">
    <div class="statusBar">🟢 Open | 👤 Active: 35 | 📖 Reading: 12</div>
    <div class="timer">🕒 <span id="clock"></span> | 📅 <span id="date"></span></div>
  </div>
  <div class="topRow">
    <div class="quoteBar">💡 Today’s Thought: Small steps lead to big success.</div>
    <div class="currentRead">📖 You are reading: <span id="currentBook">None</span></div>
  </div>
</header>

<div class="layout" id="libraryView">
<div class="sidebar">
<h3>🔍 Search</h3>
<input type="text" id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Modes</h3>
<button onclick="setMode('')">Normal</button>
<button onclick="setMode('dark')">Dark</button>
<button onclick="setMode('ambience')">Library Ambience</button>

<h3>🤖 AI Recommend</h3>
<div style="display:flex;gap:6px;">
<div id="recommend" style="flex:1;padding:6px;border-radius:6px;background:#eee;">---</div>
<div onclick="changeRecommend()" style="padding:6px 10px;border-radius:6px;background:#0d1b2a;color:white;cursor:pointer;">AI</div>
</div>

<h3>🛠 Admin Panel</h3>
<button onclick="openAdmin()">Login as Admin</button>
</div>

<div style="flex:1;display:flex;flex-direction:column;">
<div class="bookshelf" id="bookGrid"></div>
</div>
</div>

<div id="reader">
<h2 id="bookTitle"></h2>
<div class="progress"><span id="bar"></span></div>
<div class="page" id="pageText"></div>
<button onclick="prevPage()">⬅</button>
<button onclick="nextPage()">➡</button>
<button onclick="back()">⬅ Back</button>
</div>

<script>
let technicalBooks=[
"Artificial Intelligence","Machine Learning","Deep Learning","Python Programming","Java Programming",
"C Programming","C++ Programming","Web Development","Mobile App Development","Cloud Computing",
"Cyber Security","Ethical Hacking","Data Science","Big Data","Blockchain",
"Computer Networks","Operating Systems","Database Management","Software Engineering","Compiler Design",
"DevOps","Microservices","Internet of Things","Robotics","Natural Language Processing",
"Quantum Computing","Bioinformatics","Digital Forensics","UI UX Design","Game Development",
"AR VR","Embedded Systems","Microprocessors","Network Security","Information Security",
"Pattern Recognition","Smart Systems","Distributed Systems","Human Computer Interaction","Digital Image Processing",
"Computer Vision","Data Structures","Algorithms","Linux Administration","Shell Scripting",
"Computer Architecture","Parallel Computing","Mobile Security","Web Security","Software Architecture"
];

let nonTechnicalBooks=[
"Life Lessons","Positive Thinking","Self Discipline","Motivational Stories","Time Management",
"Leadership Skills","Public Speaking","Personality Development","Mind Power","Emotional Intelligence",
"Success Habits","Confidence Building","Stress Management","Creative Thinking","Decision Making",
"Goal Setting","Communication Skills","Team Work","Critical Thinking","Adaptability",
"Happiness Guide","Focus Training","Memory Power","Meditation Basics","Inner Peace",
"Career Guidance","Study Techniques","Exam Success","Reading Skills","Writing Skills",
"Story Writing","Poetry Collection","Short Stories","Moral Tales","Historical Stories",
"Travel Stories","Inspirational Biographies","Young Achievers","Freedom Fighters","Environmental Awareness",
"Health & Fitness","Yoga for Life","Healthy Food","Mental Wellness","Human Values",
"Social Responsibility","Personal Growth","Future Vision","Positive Habits","Smart Thinking"
];

let books=[...technicalBooks,...nonTechnicalBooks];
let pages=[];for(let i=1;i<=30;i++){pages.push("Page "+i+" content with explanation and examples.");}

let grid=document.getElementById("bookGrid");
let page=0,readCount=0;

function getBookImage(title){
  return "https://source.unsplash.com/400x600/?"+encodeURIComponent(title+",book");
}

function loadBooks(list){
grid.innerHTML="";
list.forEach((b,i)=>{
let d=document.createElement("div");
d.className="book";
d.style.backgroundImage=`url('${getBookImage(b)}')`;
d.innerHTML="<span>"+b+"</span>";
d.onclick=()=>openBook(i);
grid.appendChild(d);
});
recommend.innerText=list[Math.floor(Math.random()*list.length)];
}
loadBooks(books);

function filterBooks(){
let t=searchBox.value.toLowerCase();
loadBooks(books.filter(b=>b.toLowerCase().includes(t)));
}

function openBook(i){
libraryView.style.display="none";
reader.style.display="block";
bookTitle.innerText=books[i];
currentBook.innerText=books[i];
page=0;showPage();
readCount++;document.getElementById("readCount").innerText=readCount;
}
function showPage(){pageText.innerText=pages[page];bar.style.width=((page+1)/pages.length*100)+"%";}
function nextPage(){if(page<pages.length-1){page++;showPage();}}
function prevPage(){if(page>0){page--;showPage();}}
function back(){reader.style.display="none";libraryView.style.display="flex";}
function setMode(m){document.body.className=m;}
function changeRecommend(){recommend.innerText=books[Math.floor(Math.random()*books.length)];}

function openAdmin(){
let pass=prompt("Enter Admin Password:");
if(pass==="1234"){
let name=prompt("Enter new book name:");
if(name){
books.push(name);
loadBooks(books);
alert("Book Added Successfully!");
}
}else{alert("Wrong Password");}
}

function updateClock(){
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
}
setInterval(updateClock,1000);updateClock();
</script>
</body>
</html>
