<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library | Dept of Technology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .book-card:hover { transform: scale(1.03); transition: 0.3s; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-indigo-900 text-white p-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-university text-3xl text-yellow-400"></i>
                <div>
                    <h1 class="text-2xl font-bold uppercase tracking-wider">Smart Library System</h1>
                    <p class="text-xs opacity-75 italic text-yellow-200">Department of Excellence - 2026</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="searchBook()" 
                    placeholder="Search Books (e.g., Java, Python, Math)..." 
                    class="w-full p-4 rounded-full text-gray-800 outline-none focus:ring-4 focus:ring-yellow-500 shadow-inner">
                <button class="absolute right-4 top-4 text-indigo-900">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-white p-4 rounded-xl shadow-md border-b-4 border-blue-500 text-center">
                <p class="text-gray-500 text-sm">Total Books</p>
                <p class="text-2xl font-bold">12,450+</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md border-b-4 border-green-500 text-center">
                <p class="text-gray-500 text-sm">Available Now</p>
                <p class="text-2xl font-bold">8,120</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md border-b-4 border-orange-500 text-center">
                <p class="text-gray-500 text-sm">Digital E-Books</p>
                <p class="text-2xl font-bold">4,500</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md border-b-4 border-red-500 text-center">
                <p class="text-gray-500 text-sm">Members</p>
                <p class="text-2xl font-bold">1,200</p>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-6">Explore Department Books</h2>

        <div id="bookGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const books = [
            { title: "Core Java Programming", author: "James Gosling", dept: "IT/CSE", status: "Available", color: "blue" },
            { title: "Advanced Data Structures", author: "Mark Allen", dept: "CSE", status: "In Use", color: "red" },
            { title: "Microprocessors", author: "Ramesh Gaonkar", dept: "ECE", status: "Available", color: "green" },
            { title: "Power Systems", author: "Kothari", dept: "EEE", status: "Available", color: "yellow" },
            { title: "Python for Data Science", author: "Guido Van", dept: "IT/AI", status: "Available", color: "blue" },
            { title: "Thermodynamics", author: "PK Nag", dept: "MECH", status: "In Use", color: "gray" },
            { title: "Machine Learning", author: "Andrew Ng", dept: "AI/DS", status: "Available", color: "indigo" },
            { title: "Computer Networks", author: "Tanenbaum", dept: "IT", status: "Available", color: "blue" }
        ];

        function displayBooks(bookList) {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            
            bookList.forEach(book => {
                const badgeColor = book.status === 'Available' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                
                grid.innerHTML += `
                    <div class="book-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 cursor-pointer">
                        <div class="h-3 bg-indigo-600"></div>
                        <div class="p-6">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-500">${book.dept}</span>
                            <h3 class="text-lg font-bold text-gray-800 mt-1">${book.title}</h3>
                            <p class="text-sm text-gray-500 mb-4 italic">By ${book.author}</p>
                            
                            <div class="flex justify-between items-center mb-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${badgeColor}">${book.status}</span>
                            </div>

                            <div class="flex gap-2">
                                <button onclick="alert('Booking request sent for ${book.title}')" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm hover:bg-indigo-700">Borrow</button>
                                <button onclick="alert('Reading E-book...')" class="px-3 py-2 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Search Logic
        function searchBook() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filteredBooks = books.filter(book => 
                book.title.toLowerCase().includes(input) || 
                book.dept.toLowerCase().includes(input) ||
                book.author.toLowerCase().includes(input)
            );
            displayBooks(filteredBooks);
        }

        // Initial Load
        displayBooks(books);
    </script>

    <footer class="mt-20 bg-indigo-950 text-white p-10 text-center">
        <p>© 2026 Smart Library Management System | Digital Transformation</p>
        <div class="flex justify-center gap-6 mt-4 opacity-70">
            <a href="#" onclick="alert('Opening Admin Panel...')">Admin Login</a>
            <a href="#" onclick="alert('Opening Rules...')">Library Rules</a>
            <a href="#" onclick="alert('Opening Feedback...')">Feedback</a>
        </div>
    </footer>

</body>
</html>
