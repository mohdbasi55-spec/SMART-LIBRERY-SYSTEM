<!DOCTYPE html>
<html>
<head>
<title>Smart Library System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--bg:#eef2f7;--text:#000;--card:#fff;--header:#0d1b2a;}
.dark{--bg:#121212;--text:#fff;--card:#1e1e1e;--header:#000;}
.ambience{--bg:#0b132b;--text:#eaeaea;--card:#1c2541;--header:#000;}

body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text);}

header{background:var(--header);color:white;padding:12px;text-align:center}
header h2{margin:4px}

.layout{display:flex;height:calc(100vh - 80px);}

.sidebar{
width:260px;
background:var(--card);
padding:15px;
overflow:auto;
box-shadow:2px 0 10px rgba(0,0,0,0.1)
}

.sidebar input,.sidebar button{
width:100%;
padding:8px;
margin-top:6px;
border-radius:6px;
border:1px solid #aaa
}

.bookshelf{
flex:1;
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:18px;
overflow-y:auto
}

.book{
height:220px;
border-radius:12px;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
justify-content:center;
color:white;
font-weight:bold;
padding:10px;
text-shadow:0 2px 6px black;
cursor:pointer;
transition:.3s
}

.book:hover{transform:scale(1.06)}

#reader{display:none;padding:20px}

.page{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px
}

.recommendBox{
margin-top:20px;
}

.recBook{
display:inline-block;
background:#0d1b2a;
color:white;
padding:6px 10px;
border-radius:6px;
margin:4px;
cursor:pointer;
font-size:14px
}
</style>
</head>

<body>

<header>
<h2>📚 Smart Library System</h2>
<div>Staff Digital Teaching Library</div>
</header>

<div class="layout" id="libraryView">

<div class="sidebar">

<h3>🔍 Search</h3>
<input id="searchBox" onkeyup="filterBooks()" placeholder="Search book">

<h3>🎛 Modes</h3>
<button onclick="setMode('')">Normal</button>
<button onclick="setMode('dark')">Dark</button>
<button onclick="setMode('ambience')">Library</button>

<h3>🤖 AI Recommend</h3>
<div id="recommend">---</div>

</div>

<div class="bookshelf" id="bookGrid"></div>

</div>

<div id="reader">

<h2 id="bookTitle"></h2>

<div class="page" id="pageText"></div>

<h3>📚 Recommended Books</h3>
<div class="recommendBox" id="recommendBooks"></div>

<button onclick="back()">⬅ Back</button>

</div>

<script>

let books=[
"Artificial Intelligence","AI Algorithms","Machine Learning","ML Projects",
"Deep Learning","Advanced Deep Learning","Neural Networks","AI Applications",
"Python Programming","Python for AI","Python Projects",
"Cyber Security","Network Security","Ethical Hacking","Digital Forensics",
"Cloud Computing","AWS Cloud","Azure Cloud",
"Robotics","Industrial Robotics",
"Data Science","Data Analytics","Big Data",
"Blockchain","Cryptocurrency Technology",
"Operating Systems","Linux Administration",
"Algorithms","Data Structures",
"Life Lessons","Positive Thinking","Time Management",
"Leadership Skills","Public Speaking","Mind Power",
"Emotional Intelligence","Stress Management",
"Creative Thinking","Decision Making",
"Success Habits","Motivational Stories"
];

let images=[
"https://images.unsplash.com/photo-1677442136019-21780ecad995",
"https://images.unsplash.com/photo-1555949963-aa79dcee981c",
"https://images.unsplash.com/photo-1515879218367-8466d910aaa4",
"https://images.unsplash.com/photo-1518779578993-ec3579fee39f",
"https://images.unsplash.com/photo-1451187580459-43490279c0fa"
];

let grid=document.getElementById("bookGrid");

function loadBooks(list){

grid.innerHTML="";

list.forEach((b,i)=>{

let d=document.createElement("div");

d.className="book";
d.style.backgroundImage="url("+images[i%images.length]+")";

d.innerText=b;

d.onclick=()=>openBook(b);

grid.appendChild(d);

});

recommend.innerText=list[Math.floor(Math.random()*list.length)];

}

loadBooks(books);

function filterBooks(){

let t=searchBox.value.toLowerCase();

let filtered=books.filter(b=>b.toLowerCase().includes(t));

loadBooks(filtered);

}

function openBook(name){

libraryView.style.display="none";
reader.style.display="block";

bookTitle.innerText=name;

pageText.innerText="Teaching content of "+name+" with explanation and examples.";

showRecommendations(name);

}

function showRecommendations(name){

let key=name.split(" ")[0].toLowerCase();

let rec=books.filter(b=>b.toLowerCase().includes(key) && b!==name);

let box=document.getElementById("recommendBooks");

box.innerHTML="";

rec.slice(0,6).forEach(b=>{

let d=document.createElement("div");

d.className="recBook";

d.innerText=b;

d.onclick=()=>openBook(b);

box.appendChild(d);

});

}

function back(){

reader.style.display="none";

libraryView.style.display="flex";

}

function setMode(m){

document.body.className=m;

}

</script>

</body>
</html>
