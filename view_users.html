<!DOCTYPE html>
<html>
<head>
    <title>View Users</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: 'Poppins', sans-serif;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }

        th {
            background: #4facfe;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn {
            background: red;
            color: white;
        }

        .logout-btn {
            float: right;
            background: black;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <button class="logout-btn" onclick="logout()">Logout</button>

    <h2>👥 All Registered Users</h2>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Full Name</th>
                <th>User ID</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="userTable">
        </tbody>
    </table>

</div>

<script>

// 🔒 Check Admin Access
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser || currentUser.role !== "Admin"){
    alert("Access Denied!");
    window.location.href = "login.html";
}

// 📥 Load Users
function loadUsers(){
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let table = document.getElementById("userTable");

    table.innerHTML = "";

    if(users.length === 0){
        table.innerHTML = "<tr><td colspan='5'>No Users Found</td></tr>";
        return;
    }

    users.forEach((user, index) => {
        table.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${user.fullname}</td>
                <td>${user.user_id}</td>
                <td>${user.role}</td>
                <td>
                    <button class="delete-btn" onclick="deleteUser(${index})">Delete</button>
                </td>
            </tr>
        `;
    });
}

// ❌ Delete User
function deleteUser(index){
    let users = JSON.parse(localStorage.getItem("users")) || [];

    if(confirm("Are you sure to delete this user?")){
        users.splice(index, 1);
        localStorage.setItem("users", JSON.stringify(users));
        loadUsers();
    }
}

// 🚪 Logout
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

// 🔄 Load on Start
loadUsers();

</script>

</body>
</html>
