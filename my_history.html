<?php
session_start();
include 'db.php';

if(!isset($_SESSION['user_id'])){ header("Location: login.php"); exit(); }
$user_id = $_SESSION['user_id'];

// 1. Calculate Stats (Student Progress)
$total_q = mysqli_query($conn, "SELECT COUNT(*) as total FROM transactions WHERE user_id='$user_id'");
$total_data = mysqli_fetch_assoc($total_q);

$digital_q = mysqli_query($conn, "SELECT COUNT(*) as digital FROM transactions WHERE user_id='$user_id' AND status='Digital Read'");
$digital_data = mysqli_fetch_assoc($digital_q);

// 2. Fetch History List
$query = "SELECT t.*, b.book_name, b.author FROM transactions t 
          JOIN books b ON t.book_id = b.book_id 
          WHERE t.user_id = '$user_id' ORDER BY t.issue_date DESC";
$result = mysqli_query($conn, $query);
?>
